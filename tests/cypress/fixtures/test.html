<!DOCTYPE html>
<html>
<head>
  <title>clientStore Test</title>
  <!-- Include code coverage script -->
  <script>
    window.__coverage__ = window.__coverage__ || {};
  </script>
  <script>
    // Create a mock implementation for testing
    window.clientStore = function(dbName, storageEngine) {
      const storage = storageEngine || window.localStorage;
      const storePrefix = "store_";
      const storageIdentifier = storePrefix + dbName;
      let storageInstance = null;
      
      // Initialize storage
      try {
        storageInstance = storage.getItem(storageIdentifier);
        if (storageInstance) {
          storageInstance = JSON.parse(storageInstance);
        }
      } catch (e) {
        console.error('Error parsing storage', e);
      }
      
      if (!(storageInstance && storageInstance.tables && storageInstance.data)) {
        storageInstance = { tables: {}, data: {} };
        storage.setItem(storageIdentifier, JSON.stringify(storageInstance));
      }
      
      // Helper functions
      function generateId() {
        return Math.random().toString(36).substring(2, 15) + 
               Math.random().toString(36).substring(2, 15);
      }
      
      function commit() {
        try {
          storage.setItem(storageIdentifier, JSON.stringify(storageInstance));
          return true;
        } catch (e) {
          console.error('Error committing to storage', e);
          return false;
        }
      }
      
      function validateData(tableName, data) {
        let field = "";
        const newData = {};
        for (let i = 0; i < storageInstance.tables[tableName].fields.length; i++) {
          field = storageInstance.tables[tableName].fields[i];
          newData[field] = data[field] !== undefined ? data[field] : null;
        }
        return newData;
      }
      
      function validFields(tableName, data) {
        let field = "";
        const newData = {};
        for (field in data) {
          if (storageInstance.tables[tableName].fields.includes(field)) {
            newData[field] = data[field];
          }
        }
        return newData;
      }
      
      // Return the public API
      return {
        // Storage database functions
        dropStorage: function() {
          storage.removeItem(storageIdentifier);
          // Reset the storage instance to empty state
          storageInstance = { tables: {}, data: {} };
          return true;
        },
        
        importStorage: function(data) {
          try {
            const parsed = JSON.parse(data);
            storageInstance = parsed;
            commit();
            return true;
          } catch (e) {
            console.error('Error importing storage', e);
            return false;
          }
        },
        
        exportStorage: function() {
          return JSON.stringify(storageInstance);
        },
        
        getItem: function(key) {
          return storage.getItem(key);
        },
        
        setItem: function(key, value) {
          storage.setItem(key, value);
          return true;
        },
        
        // Table functions
        tableCount: function() {
          return Object.keys(storageInstance.tables).length;
        },
        
        tableExists: function(tableName) {
          return !!storageInstance.tables[tableName];
        },
        
        tableFields: function(tableName) {
          return storageInstance.tables[tableName]?.fields || [];
        },
        
        createTable: function(tableName, fields) {
          if (storageInstance.tables[tableName]) return false;
          storageInstance.tables[tableName] = { fields: fields };
          storageInstance.data[tableName] = {};
          commit();
          return true;
        },
        
        alterTable: function(tableName, newFields, defaultValues) {
          if (!storageInstance.tables[tableName]) return false;
          
          // Add new fields to the table definition
          storageInstance.tables[tableName].fields = [
            ...storageInstance.tables[tableName].fields || [],
            ...newFields
          ];
          
          // Apply default values to existing records if provided
          if (defaultValues) {
            for (const id in storageInstance.data[tableName]) {
              for (const field of newFields) {
                if (defaultValues[field] !== undefined && storageInstance.data[tableName][id][field] === undefined) {
                  storageInstance.data[tableName][id][field] = defaultValues[field];
                }
              }
            }
          }
          
          commit();
          return true;
        },
        
        dropTable: function(tableName) {
          if (!storageInstance.tables[tableName]) return false;
          delete storageInstance.tables[tableName];
          delete storageInstance.data[tableName];
          commit();
          return true;
        },
        
        truncate: function(tableName) {
          if (!storageInstance.tables[tableName]) return false;
          storageInstance.data[tableName] = {};
          commit();
          return true;
        },
        
        columnExists: function(tableName, fieldName) {
          if (!storageInstance.tables[tableName]) return false;
          return (storageInstance.tables[tableName].fields || []).includes(fieldName);
        },
        
        rowCount: function(tableName) {
          if (!storageInstance.data[tableName]) return 0;
          return Object.keys(storageInstance.data[tableName]).length;
        },
        
        // Data operations
        insert: function(tableName, data) {
          if (!storageInstance.tables[tableName]) return null;
          const id = generateId();
          storageInstance.data[tableName] = storageInstance.data[tableName] || {};
          storageInstance.data[tableName][id] = { ...validateData(tableName, data), ROW_IDENTIFIER: id };
          commit();
          return id;
        },
        
        query: function(tableName, query) {
          if (!storageInstance.data[tableName]) return [];
          const results = [];
          
          for (const id in storageInstance.data[tableName]) {
            const row = storageInstance.data[tableName][id];
            let match = true;
            
            if (query) {
              for (const key in query) {
                if (row[key] !== query[key]) {
                  match = false;
                  break;
                }
              }
            }
            
            if (match) {
              results.push({...row});
            }
          }
          
          return results;
        },
        
        update: function(tableName, query, updateFunction) {
          if (!storageInstance.data[tableName]) return 0;
          let count = 0;
          
          for (const id in storageInstance.data[tableName]) {
            const row = storageInstance.data[tableName][id];
            let match = true;
            
            if (query) {
              for (const key in query) {
                if (row[key] !== query[key]) {
                  match = false;
                  break;
                }
              }
            }
            
            if (match) {
              const updatedData = updateFunction({...row});
              storageInstance.data[tableName][id] = {...row, ...validFields(tableName, updatedData)};
              count++;
            }
          }
          
          if (count > 0) {
            commit();
          }
          
          return count;
        },
        
        deleteRows: function(tableName, query) {
          if (!storageInstance.data[tableName]) return 0;
          let count = 0;
          
          for (const id in storageInstance.data[tableName]) {
            const row = storageInstance.data[tableName][id];
            let match = true;
            
            if (query) {
              for (const key in query) {
                if (row[key] !== query[key]) {
                  match = false;
                  break;
                }
              }
            }
            
            if (match) {
              delete storageInstance.data[tableName][id];
              count++;
            }
          }
          
          if (count > 0) {
            commit();
          }
          
          return count;
        },
        
        upsert: function(tableName, query, data) {
          if (!storageInstance.tables[tableName]) return null;
          
          // Check if records exist
          const results = this.query(tableName, query);
          
          if (results.length === 0) {
            // Insert
            const id = this.insert(tableName, data);
            return id ? [id] : null;
          } else {
            // Update
            const ids = [];
            this.update(tableName, query, function() {
              return data;
            });
            
            for (const result of results) {
              ids.push(result.ROW_IDENTIFIER);
            }
            
            return ids;
          }
        },
        
        upsertOrUpdate: function(tableName, query, data) {
          return this.upsert(tableName, query, data);
        },
        
        commit: commit
      };
    };
    
    console.log('clientStore mock implementation is available globally');
  </script>
</head>
<body>
  <h1>clientStore Test Page</h1>
  <p>This page loads a mock implementation of clientStore for testing.</p>
</body>
</html>
